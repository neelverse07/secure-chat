<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Chat</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN SCREEN -->
<div class="container" id="loginScreen">
  <h1>🔒 SECURE CHAT</h1>
  <p class="status">STATUS: E2E ENCRYPTED</p>

  <input id="username" type="text" placeholder="Enter your name">
  <input id="room" type="text" placeholder="Room Code">

  <button id="enterBtn">+ ENTER ROOM</button>
</div>

<!-- CHAT SCREEN -->
<div class="chat-container" id="chatScreen">

  <div class="chat-header">
    <span id="roomName">Room</span>
    <span class="secure">🔐 SECURE</span>
  </div>

  <div id="chat" class="chat-box"></div>

  <div class="inputArea">
    <input id="messageInput" type="text" placeholder="Type message">
    <button id="sendBtn">Send</button>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
